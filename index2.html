<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EstudLive</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #1f5f7f;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
    }

    /* CARD CENTRAL */
    .card {
        background: #1f1f2e;
        width: 350px;
        padding: 40px 30px;
        border-radius: 25px;
        box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        text-align: center;
        color: white;
    }

    .title {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    label {
        display: block;
        text-align: left;
        margin-top: 15px;
        font-size: 14px;
        color: #dcdcdc;
    }

    input {
        width: 100%;
        padding: 12px;
        border: none;
        outline: none;
        border-radius: 30px;
        margin-top: 5px;
        font-size: 14px;
    }

    /* BOTÃO */
    button {
        width: 100%;
        margin-top: 25px;
        background: #3131ff;
        padding: 12px;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background: #00bfbf;
    }
</style>
</head>

<body>

    <div class="card">
        <div class="title">ESTUDLIVE</div>
        <h3>Cadastre-se</h3>

        <label>Digite seu email:</label>
        <input type="email" placeholder="exemplo@gmail.com">

        <label>Crie uma senha</label>
        <input type="password" placeholder="sua senha">

        <label>Confirme sua senha</label>
        <input type="password" placeholder="confirme sua senha">

        <a href="index.html"><button>ENTRAR</button>
    </div>

</body>

</script>
</html>
