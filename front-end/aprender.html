<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EstudLive - Aprender</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #dcdcdc;
    }

    header {
      width: 100%;
      height: 50px;
      background-color: #8fa0bf;
      display: flex;
      align-items: center;
      padding-left: 15px;
      box-sizing: border-box;
      color: white;
      font-size: 20px;
      font-weight: bold;
      gap: 10px;
    }

    header .logo {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid #4571c4;
      color: #4571c4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
      background-color: white;
    }

    .menu-lateral {
      width: 180px;
      background-color: #8fa0bf;
      height: calc(100vh - 50px);
      position: fixed;
      top: 50px;
      left: 0;
      padding-top: 20px;
      display: flex;
      flex-direction: column;
    }

    .menu-lateral a {
      display: block;
      padding: 10px 20px;
      color: white;
      text-decoration: none;
      font-size: 16px;
      transition: background 0.3s;
      border: none;
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .menu-lateral a:hover,
    .menu-lateral a.ativo {
      background-color: #d6938a;
      border-radius: 8px;
    }

    .conteudo-principal {
      margin-left: 180px;
      height: calc(100vh - 50px);
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #a5b7d4;
    }

    .botoes-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 120px;
    }

    .botao {
      background-color: #8fa0bf;
      width: 200px;
      padding: 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-align: center;
      color: white;
      font-size: 18px;
      transition: 0.3s;
    }

    .botao:hover {
      background-color: #d6938a;
      transform: scale(1.05);
    }

    .botao img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 10px;
      display: block;
      margin: 0 auto 10px auto;
    }

    .divider {
      width: 2px;
      height: 400px;
      background-color: #7287ad;
      border-radius: 2px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">E</div>
  <span>EstudLive</span>
</header>

<div class="menu-lateral">
  <a href="princ.html">Menu</a>
  <a href="aprender.html" class="ativo">Aprender</a>
  <a href="skins.html">Skins</a>
  <a href="#">Missões</a>
  <a href="pinguia.html">PinGuai</a>
  <a href="#">Rank</a>
  <a href="#">Vídeo Curso</a>
  <a href="#">Meus Cursos</a>
</div>

<div class="conteudo-principal">
  <div class="botoes-container">
    <button class="botao">
      <img src="https://wikiwandv2-19431.kxcdn.com/_next/image?url=https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Lua-Logo.svg/langpt-640px-Lua-Logo.svg.png&w=640&q=50" alt="Lua" />
      Lua
    </button>

    <div class="divider"></div>

    <button class="botao">
      <img src="https://files.cercomp.ufg.br/weby/up/1197/o/1_RJMxLdTHqVBSijKmOO5MAg.jpeg?1631307009" alt="Python" />
      Python
    </button>
  </div>
</div>

</body>
</html>
