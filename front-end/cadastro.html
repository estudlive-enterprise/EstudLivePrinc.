<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EstudLive - Cadastro</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #a5b7d4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .card {
      background: #7287ad;
      width: 400px;
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.3);
      text-align: center;
      color: white;
    }

    .logo-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid #4571c4;
      color: #4571c4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 22px;
      background-color: white;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      margin: 0;
      color: white;
    }

    .subtitle {
      font-size: 16px;
      color: #e8e8e8;
      margin: 15px 0 25px 0;
    }

    label {
      display: block;
      text-align: left;
      margin-top: 15px;
      font-size: 14px;
      color: white;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px;
      border: none;
      outline: none;
      border-radius: 8px;
      margin-top: 6px;
      font-size: 14px;
      box-sizing: border-box;
      background-color: #f0f0f0;
      color: #333;
    }

    input::placeholder {
      color: #999;
    }

    input:focus {
      background-color: white;
      box-shadow: 0 0 5px rgba(69, 113, 196, 0.3);
    }

    button {
      width: 100%;
      margin-top: 25px;
      background: #d6938a;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      transition: background-color 0.3s;
    }

    button:hover {
      background: #c87a72;
    }

    .link-login {
      margin-top: 15px;
      font-size: 14px;
      color: white;
    }

    .link-login a {
      color: #4571c4;
      text-decoration: none;
      font-weight: bold;
    }

    .link-login a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo-header">
      <div class="logo">E</div>
      <div class="title">EstudLive</div>
    </div>
    <h3 class="subtitle">Cadastre-se</h3>

    <form>
      <label>Digite seu email:</label>
      <input type="email" placeholder="exemplo@gmail.com" required>

      <label>Crie uma senha</label>
      <input type="password" placeholder="sua senha" required>

      <label>Confirme sua senha</label>
      <input type="password" placeholder="confirme sua senha" required>

      <button type="submit">CADASTRAR</button>
    </form>

    <div class="link-login">
      Já tem uma conta? <a href="login.html">Faça login aqui</a>
    </div>
  </div>

</body>
</html>
